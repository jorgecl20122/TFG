<!DOCTYPE html>
<html lang="es">
    <head>
    <meta charset="UTF-8">
        <title>Subir audio</title>
    </head>
    <body>
        <h1>Transcriptor de reuniones</h1>

        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="audio" accept=".mp3,.wav,.m4a,.mpeg,.mp4" required>
            <button type="submit">Subir y transcribir</button>
        </form>
    </body>
</html>
